version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      next-react:
        patterns:
          - next
          - eslint-config-next
          - react
          - react-dom
          - "@types/react"
          - "@types/react-dom"
      tailwind:
        patterns:
          - tailwindcss
          - "@tailwindcss/*"
          - prettier-plugin-tailwindcss
      typescript-eslint:
        patterns:
          - typescript
          - typescript-eslint
          - "@typescript-eslint/*"
          - eslint
          - "@types/eslint"
      prisma:
        patterns:
          - prisma
          - "@prisma/client"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
